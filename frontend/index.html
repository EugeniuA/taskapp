<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager v3.1</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { color: #2c3e50; }
    .task { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; }
    .task.done span { text-decoration: line-through; color: #aaa; }
    button { cursor: pointer; padding: 6px 12px; border: none; border-radius: 4px; }
    .btn-add { background: #27ae60; color: white; }
    .btn-toggle { background: #3498db; color: white; }
    .btn-delete { background: #e74c3c; color: white; }
    input { padding: 8px; width: 70%; border: 1px solid #ddd; border-radius: 4px; }
    #hostname { color: #7f8c8d; font-size: 12px; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>📋 Task Manager v3.1</h1>
  <div>
    <input id="taskInput" placeholder="New task..." />
    <button class="btn-add" onclick="addTask()">Add</button>
  </div>
  <div id="taskList"></div>
  <p id="hostname"></p>

  <script>
    const API = `https://taskapp-backend-965723188774.europe-west1.run.app/api/tasks`;

    async function loadTasks() {
      const res = await fetch(API);
      const tasks = await res.json();
      document.getElementById('taskList').innerHTML = tasks.map(t => `
        <div class="task ${t.done ? 'done' : ''}">
          <span>${t.title}</span>
          <button class="btn-toggle" onclick="toggleTask(${t.id})">✓</button>
          <button class="btn-delete" onclick="deleteTask(${t.id})">✗</button>
        </div>`).join('');
    }

    async function addTask() {
      const title = document.getElementById('taskInput').value;
      if (!title) return;
      await fetch(API, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title}) });
      document.getElementById('taskInput').value = '';
      loadTasks();
    }

    async function toggleTask(id) {
      await fetch(`${API}/${id}`, { method: 'PUT' });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadTasks();
    }

    fetch(`https://taskapp-backend-965723188774.europe-west1.run.app/health`)
      .then(r => r.json())
      .then(d => document.getElementById('hostname').textContent = `Backend pod: ${d.hostname}`);

    loadTasks();
  </script>
</body>
</html>
